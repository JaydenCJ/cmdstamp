<svg xmlns="http://www.w3.org/2000/svg" width="720" height="416" viewBox="0 0 720 416" font-family="ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, Consolas, monospace" font-size="13">
  <rect x="0" y="0" width="720" height="416" rx="10" fill="#1c1f26"/>
  <rect x="0" y="0" width="720" height="30" rx="10" fill="#2a2e38"/>
  <rect x="0" y="20" width="720" height="10" fill="#2a2e38"/>
  <circle cx="20" cy="15" r="5" fill="#ff5f57"/>
  <circle cx="38" cy="15" r="5" fill="#febc2e"/>
  <circle cx="56" cy="15" r="5" fill="#28c840"/>
  <text x="360" y="19" fill="#8b93a7" text-anchor="middle" font-size="12">cmdstamp — command output, stamped into docs</text>

  <text x="20" y="56" fill="#9aa2b5"><tspan fill="#28c840">$</tspan> cmdstamp update</text>
  <text x="20" y="76" fill="#c8ceda"><tspan fill="#98c379">stamped</tspan>    README.md#cli-help</text>
  <text x="20" y="94" fill="#8b93a7">1 region: 1 stamped, 0 unchanged</text>

  <text x="20" y="122" fill="#9aa2b5"><tspan fill="#28c840">$</tspan> sed -n '5,10p' README.md</text>
  <text x="20" y="142" fill="#5c6370">&lt;!-- cmdstamp:begin cli-help --&gt;</text>
  <text x="20" y="160" fill="#c8ceda">```text</text>
  <text x="20" y="178" fill="#c8ceda">usage: mytool [--help] [pack|unpack] FILE</text>
  <text x="20" y="196" fill="#c8ceda">  pack FILE     bundle FILE into an archive</text>
  <text x="20" y="214" fill="#c8ceda">```</text>
  <text x="20" y="232" fill="#5c6370">&lt;!-- cmdstamp:end cli-help --&gt;</text>

  <text x="20" y="260" fill="#9aa2b5"><tspan fill="#28c840">$</tspan> cmdstamp verify   <tspan fill="#5c6370"># next release: --help changed</tspan></text>
  <text x="20" y="280" fill="#c8ceda"><tspan fill="#e06c75">stale</tspan>   README.md#cli-help</text>
  <text x="20" y="298" fill="#8b93a7">@@ -1,4 +1,4 @@</text>
  <text x="20" y="316" fill="#c8ceda"> usage: mytool [--help] [pack|unpack] FILE</text>
  <text x="20" y="334" fill="#e06c75">-  pack FILE     bundle FILE into an archive</text>
  <text x="20" y="352" fill="#98c379">+  pack FILE     bundle FILE into a sealed archive</text>
  <text x="20" y="370" fill="#8b93a7">1 region: 0 ok, 1 stale</text>
  <text x="20" y="390" fill="#c8ceda">run `cmdstamp update` to restamp <tspan fill="#5c6370"># exit 1 — gate your release on it</tspan></text>
</svg>
